# nvidia-xconfig: X configuration file generated by nvidia-xconfig
# nvidia-xconfig:  version 530.41.03

Section "ServerLayout"
    Identifier     "Layout0"
    Screen      0  "Screen0"
    InputDevice    "Keyboard0" "CoreKeyboard"
    InputDevice    "Mouse0" "CorePointer"
EndSection

Section "Files"
EndSection

Section "InputDevice"
    # generated from default
    Identifier     "Mouse0"
    Driver         "mouse"
    Option         "Protocol" "auto"
    Option         "Device" "/dev/psaux"
    Option         "Emulate3Buttons" "no"
    Option         "ZAxisMapping" "4 5"
EndSection

Section "InputDevice"
    # generated from default
    Identifier     "Keyboard0"
    Driver         "kbd"
EndSection

Section "Monitor"
    Identifier     "DP-4"
    Option         "DPMS"
	Option		   "Enable" "true"
	Option		   "Primary" "true"
EndSection

Section "Monitor"
    Identifier     "HDMI-0"
    Option         "DPMS"
	Option		   "Enable" "true"
EndSection

Section "Device"
    Identifier     "Device0"
    Driver         "nvidia"
    VendorName     "NVIDIA Corporation"
	Option 		   "NoLogo" "True"
    Option         "VertRefresh"        "DP-4: 43-73; HDMI-0: 43-73"
    Option         "MetaModes"          "1920x1080, 1920x1080"
    Option         "ConnectedMonitor"   "DP-4, HDMI-0"
    Option         "MetaModeOrientation" "HDMI-0 LeftOf DP-4"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "Device0"
    Monitor        "Monitor0"
    DefaultDepth    24
    Option		   "TwinView" "true"
	SubSection     "Display"
        Depth       24
		Modes	   "1920x1080"
    EndSubSection
EndSection

